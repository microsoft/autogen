kcp_version: "0.3"
id: autogen
description: "Microsoft AutoGen — a programming framework for agentic AI with two APIs: Core (low-level actor model) and AgentChat (high-level multi-agent teams)"

entry_points:
  primary: README.md
  architecture: python/docs/src/user-guide/core-user-guide/core-concepts/architecture-tldr.md

units:

  # ── Entry points (eager) ────────────────────────────────────────────────────

  - id: overview
    path: README.md
    kind: reference
    intent: "What is AutoGen, what can it do, and how is the repo organised?"
    scope: overview
    audience: [beginner, developer, advanced]
    triggers:
      - what is autogen
      - autogen overview
      - repo structure
      - getting started with autogen
      - autogen introduction
    hints:
      token_estimate: 800
      load_strategy: eager
      priority: high

  - id: architecture-tldr
    path: python/docs/src/user-guide/core-user-guide/core-concepts/architecture-tldr.md
    kind: reference
    intent: "Quick answer: Core vs AgentChat, standalone vs distributed runtime, actor model basics, key components"
    scope: focused
    audience: [beginner, developer, advanced]
    triggers:
      - Core vs AgentChat difference
      - which API to use
      - actor model
      - standalone vs distributed
      - runtime types
      - autogen architecture
      - what is the difference between autogen core and agentchat
    hints:
      token_estimate: 500
      load_strategy: eager
      priority: high
      summary_available: false
      summary_of: core-architecture

  - id: agentchat-tldr
    path: python/docs/src/user-guide/agentchat-user-guide/agentchat-tldr.md
    kind: guide
    intent: "Quick answer: what AgentChat is, main agent types, minimal code example, team types, termination conditions"
    scope: focused
    audience: [beginner, developer]
    triggers:
      - how do I build my first agent
      - getting started
      - quickstart
      - first multi-agent chat
      - agentchat overview
      - assistantagent example
      - roundrobin group chat
      - team types
    hints:
      token_estimate: 500
      load_strategy: eager
      priority: high
      summary_available: false
      summary_of: agentchat-quickstart

  # ── Core concepts (lazy) ────────────────────────────────────────────────────

  - id: core-architecture
    path: python/docs/src/user-guide/core-user-guide/core-concepts/architecture.md
    kind: architecture
    intent: "Full explanation of standalone and distributed runtimes with diagrams"
    scope: focused
    audience: [developer, advanced]
    triggers:
      - standalone agent runtime
      - distributed agent runtime
      - multi-process agents
      - gRPC agents
      - runtime architecture details
    hints:
      token_estimate: 400
      load_strategy: lazy
      priority: medium
      summary_available: true
      summary_unit: architecture-tldr

  - id: application-stack
    path: python/docs/src/user-guide/core-user-guide/core-concepts/application-stack.md
    kind: architecture
    intent: "How the application stack layers (messaging, routing, message protocols, patterns) fit together"
    scope: focused
    audience: [developer, advanced]
    triggers:
      - application stack
      - message protocol
      - behavior contract
      - how agents communicate
      - core framework layers
    hints:
      token_estimate: 400
      load_strategy: lazy
      priority: medium

  - id: agent-identity-lifecycle
    path: python/docs/src/user-guide/core-user-guide/core-concepts/agent-identity-and-lifecycle.md
    kind: reference
    intent: "Agent identity (AgentId, AgentType, AgentKey) and lifecycle management"
    scope: focused
    audience: [developer, advanced]
    triggers:
      - agent identity
      - agent lifecycle
      - agentid
      - agenttype
      - agent registration
      - agent key
    hints:
      token_estimate: 600
      load_strategy: lazy
      priority: medium

  - id: topic-subscription
